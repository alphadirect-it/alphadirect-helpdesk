<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Direct IT Help Desk</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
  :root{
    --navy:#0D1B2A;
    --navy-2:#1B263B;
    --navy-3:#243447;
    --orange:#F4A623;
    --orange-dim:#c98714;
    --text:#E6EAF0;
    --muted:#8a96a8;
    --border:#2c3a4f;
    --green:#22c55e;
    --red:#ef4444;
    --yellow:#eab308;
    --blue:#3b82f6;
    --gray:#6b7280;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--navy);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}
  button{font-family:inherit;cursor:pointer;border:none;outline:none}
  input,select,textarea{font-family:inherit;font-size:14px;background:var(--navy-3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:10px 12px;outline:none;width:100%}
  input:focus,select:focus,textarea:focus{border-color:var(--orange)}
  textarea{resize:vertical;min-height:80px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500}

  /* Layout */
  .app{display:none;height:100vh;grid-template-columns:240px 1fr;grid-template-rows:auto 1fr}
  .app.active{display:grid}
  .topbar{grid-column:1/-1;background:var(--navy-2);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
  .logo .dot{width:10px;height:10px;background:var(--orange);border-radius:50%}
  .topbar-right{display:flex;align-items:center;gap:16px}
  .user-pill{background:var(--navy-3);padding:6px 14px;border-radius:20px;font-size:13px;display:flex;align-items:center;gap:8px}
  .user-pill .avatar{width:24px;height:24px;background:var(--orange);color:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px}
  .btn-logout{background:transparent;color:var(--muted);font-size:13px;padding:6px 10px;border-radius:6px}
  .btn-logout:hover{color:var(--text);background:var(--navy-3)}

  .sidebar{background:var(--navy-2);border-right:1px solid var(--border);padding:20px 12px;overflow-y:auto}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;color:var(--muted);font-size:14px;cursor:pointer;margin-bottom:4px;transition:all .15s}
  .nav-item:hover{background:var(--navy-3);color:var(--text)}
  .nav-item.active{background:var(--orange);color:var(--navy);font-weight:600}
  .nav-section{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:16px 14px 8px}

  .main{padding:24px 32px;overflow-y:auto}
  .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
  .page-title{font-size:22px;font-weight:600}
  .page-subtitle{color:var(--muted);font-size:13px;margin-top:4px}

  /* Splash / Login */
  .splash{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);text-align:center}
  .splash.hidden{display:none}
  .splash-card{background:var(--navy-2);border:1px solid var(--border);border-radius:14px;padding:48px 40px;width:440px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .splash-logo{font-size:24px;font-weight:700;margin-bottom:8px}
  .splash-logo .dot{display:inline-block;width:12px;height:12px;background:var(--orange);border-radius:50%;margin-right:8px;vertical-align:middle}
  .splash-tag{color:var(--muted);font-size:14px;margin-bottom:32px}
  .splash-spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--navy-3);border-top-color:var(--orange);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .splash-status{color:var(--muted);font-size:13px;min-height:20px}
  .splash-error{background:rgba(239,68,68,.15);color:#fca5a5;padding:12px 14px;border-radius:8px;font-size:13px;margin-top:16px;text-align:left;display:none}
  .splash-error.visible{display:block}
  .btn-signin{background:var(--orange);color:var(--navy);padding:12px 28px;border-radius:8px;font-size:15px;font-weight:600;margin-top:18px;display:none}
  .btn-signin.visible{display:inline-block}

  /* Buttons */
  .btn{padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;transition:all .15s}
  .btn-primary{background:var(--orange);color:var(--navy)}
  .btn-primary:hover{background:var(--orange-dim)}
  .btn-secondary{background:var(--navy-3);color:var(--text);border:1px solid var(--border)}
  .btn-secondary:hover{background:var(--border)}
  .btn-danger{background:var(--red);color:white}
  .btn-sm{padding:6px 12px;font-size:12px}

  /* Cards & stats */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
  .stat-card{background:var(--navy-2);border:1px solid var(--border);border-radius:10px;padding:18px}
  .stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .stat-value{font-size:28px;font-weight:700;margin-top:6px}
  .stat-trend{font-size:12px;color:var(--muted);margin-top:4px}
  .stat-card.alert{border-left:4px solid var(--red)}
  .stat-card.success{border-left:4px solid var(--green)}
  .stat-card.warning{border-left:4px solid var(--yellow)}
  .stat-card.info{border-left:4px solid var(--blue)}

  /* Tables */
  .panel{background:var(--navy-2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .panel-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
  .panel-title{font-size:15px;font-weight:600}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap}
  .filter-row select,.filter-row input{width:auto;min-width:130px;padding:6px 10px;font-size:12px}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;padding:12px 18px;background:var(--navy-3);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)}
  td{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top}
  tr.clickable{cursor:pointer;transition:background .1s}
  tr.clickable:hover{background:var(--navy-3)}
  tr:last-child td{border-bottom:none}
  .empty{padding:50px;text-align:center;color:var(--muted)}
  .loading-row td{text-align:center;color:var(--muted);padding:30px;font-style:italic}

  /* Badges */
  .badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
  .badge-open{background:rgba(59,130,246,.15);color:#60a5fa}
  .badge-inprogress{background:rgba(234,179,8,.15);color:#facc15}
  .badge-onhold{background:rgba(107,114,128,.15);color:#9ca3af}
  .badge-resolved{background:rgba(34,197,94,.15);color:#4ade80}
  .badge-closed{background:rgba(107,114,128,.2);color:#9ca3af}
  .badge-low{background:rgba(34,197,94,.15);color:#4ade80}
  .badge-medium{background:rgba(234,179,8,.15);color:#facc15}
  .badge-high{background:rgba(249,115,22,.15);color:#fb923c}
  .badge-critical{background:rgba(239,68,68,.18);color:#f87171}
  .badge-sla-ok{background:rgba(34,197,94,.15);color:#4ade80}
  .badge-sla-warn{background:rgba(234,179,8,.15);color:#facc15}
  .badge-sla-breach{background:rgba(239,68,68,.18);color:#f87171}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal-bg.active{display:flex}
  .modal{background:var(--navy-2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:760px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
  .modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .modal-title{font-size:17px;font-weight:600}
  .modal-close{background:transparent;color:var(--muted);font-size:22px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px}
  .modal-close:hover{background:var(--navy-3);color:var(--text)}
  .modal-body{padding:22px;overflow-y:auto;flex:1}
  .modal-footer{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .field{margin-bottom:14px}

  /* Ticket detail */
  .detail-grid{display:grid;grid-template-columns:1fr 240px;gap:24px}
  .meta-list{background:var(--navy-3);border-radius:8px;padding:14px}
  .meta-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
  .meta-row:last-child{border-bottom:none}
  .meta-label{color:var(--muted);white-space:nowrap}
  .meta-value{font-weight:500;text-align:right;word-break:break-word}
  .activity{margin-top:24px}
  .activity h4{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:12px}
  .comment{background:var(--navy-3);border-radius:8px;padding:12px 14px;margin-bottom:10px}
  .comment-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px}
  .comment-author{font-weight:600;color:var(--text)}
  .comment-text{font-size:13px;line-height:1.5;white-space:pre-wrap}

  .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty-state .big{font-size:48px;margin-bottom:12px;opacity:.4}

  .footer-note{text-align:center;color:var(--muted);font-size:11px;padding:14px;border-top:1px solid var(--border);margin-top:24px}

  /* Toast */
  .toast{position:fixed;bottom:20px;right:20px;background:var(--navy-2);border:1px solid var(--border);border-left:4px solid var(--green);padding:14px 18px;border-radius:8px;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:200;max-width:360px;animation:slideIn .25s ease-out}
  .toast.error{border-left-color:var(--red)}
  @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

  /* Loading indicator inside panels */
  .inline-spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 1s linear infinite;vertical-align:middle;margin-right:6px}

  @media (max-width:900px){
    .app{grid-template-columns:1fr}
    .sidebar{display:none}
    .detail-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- SPLASH / LOGIN -->
<div id="splash" class="splash">
  <div class="splash-card">
    <div class="splash-logo"><span class="dot"></span>Alpha Direct IT Help Desk</div>
    <div class="splash-tag">Internal IT support for Alpha Direct Insurance staff</div>
    <div class="splash-spinner" id="splashSpinner"></div>
    <div class="splash-status" id="splashStatus">Initializing...</div>
    <button class="btn-signin" id="signInBtn">Sign in with Microsoft</button>
    <div class="splash-error" id="splashError"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="app">
  <div class="topbar">
    <div class="logo"><span class="dot"></span>Alpha Direct IT Help Desk</div>
    <div class="topbar-right">
      <div class="user-pill">
        <div class="avatar" id="userAvatar"></div>
        <div>
          <div id="userName" style="font-weight:600"></div>
          <div id="userRoleLabel" style="font-size:11px;color:var(--muted)"></div>
        </div>
      </div>
      <button class="btn-logout" id="logoutBtn">Sign out</button>
    </div>
  </div>

  <aside class="sidebar" id="sidebar"></aside>

  <main class="main" id="main"></main>
</div>

<!-- TICKET MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
// ============================================================
//  ALPHA DIRECT IT HELP DESK — v2 (SharePoint backed)
// ============================================================

const CONFIG = {
  clientId: 'e0a3b758-f709-4bf0-a4aa-f855458a5ee1',
  tenantId: 'fb4aec07-793a-494c-92f6-7a527a7f89c0',
  sharepointHost: 'alphadirectbw.sharepoint.com',
  sitePath: '/sites/ITHelpDesk',
  listName: 'IT Tickets',
  agentGroup: 'IT-HelpDesk-Agents',
  adminGroup: 'IT-HelpDesk-Admins'
};

const SLA = {
  Critical: { response: 1,  resolution: 4   },
  High:     { response: 2,  resolution: 8   },
  Medium:   { response: 4,  resolution: 24  },
  Low:      { response: 8,  resolution: 72  }
};

const CATEGORIES = ['Hardware','Software','Network','Access / Account','Email & Communication','Printing','Mobile / BYOD','Other'];
const PRIORITIES = ['Low','Medium','High','Critical'];
const STATUSES   = ['Open','In Progress','On Hold','Resolved','Closed'];
const DEPARTMENTS = ['Finance','Underwriting','Claims','Data Analytics','IT','HR','Sales','Operations','EXCO','Other'];

// ============================================================
//  MSAL — Microsoft Authentication
// ============================================================

const msalConfig = {
  auth: {
    clientId: CONFIG.clientId,
    authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: window.location.origin + window.location.pathname,
    postLogoutRedirectUri: window.location.origin + window.location.pathname,
    navigateToLoginRequestUrl: true
  },
  cache: {
    cacheLocation: 'sessionStorage',
    storeAuthStateInCookie: false
  }
};

const loginRequest = {
  scopes: ['User.Read', 'Sites.ReadWrite.All', 'GroupMember.Read.All']
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

// ============================================================
//  STATE
// ============================================================

const state = {
  user: null,            // { displayName, email, id, role: 'user'|'agent'|'admin' }
  siteId: null,
  listId: null,
  tickets: [],           // cache of all tickets
  loaded: false,
  currentPage: null,
  agentList: []          // list of IT agents (from Azure AD group)
};

// ============================================================
//  GRAPH API CLIENT
// ============================================================

async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length === 0) throw new Error('No signed-in account');
  try {
    const response = await msalInstance.acquireTokenSilent({
      ...loginRequest,
      account: accounts[0]
    });
    return response.accessToken;
  } catch (e) {
    if (e instanceof msal.InteractionRequiredAuthError) {
      try {
        const response = await msalInstance.acquireTokenPopup(loginRequest);
        return response.accessToken;
      } catch (popupErr) {
        // Fallback to redirect when popups blocked
        await msalInstance.acquireTokenRedirect(loginRequest);
        return null;
      }
    }
    throw e;
  }
}

async function callGraph(endpoint, options = {}) {
  const token = await getToken();
  const url = endpoint.startsWith('http') ? endpoint : `https://graph.microsoft.com/v1.0${endpoint}`;
  const response = await fetch(url, {
    ...options,
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
      'Accept': 'application/json',
      ...(options.headers || {})
    }
  });
  if (!response.ok) {
    const errText = await response.text();
    let errMsg = `Graph API ${response.status}`;
    try {
      const errJson = JSON.parse(errText);
      errMsg = errJson.error?.message || errMsg;
    } catch (e) { /* not JSON */ }
    throw new Error(errMsg);
  }
  if (response.status === 204) return null;
  return response.json();
}

// ============================================================
//  AUTH FLOW
// ============================================================

function setSplashStatus(msg) {
  document.getElementById('splashStatus').textContent = msg;
}
function showSplashError(msg) {
  const el = document.getElementById('splashError');
  el.textContent = msg;
  el.classList.add('visible');
  document.getElementById('splashSpinner').style.display = 'none';
  document.getElementById('signInBtn').classList.add('visible');
  document.getElementById('signInBtn').textContent = 'Try Again';
}

async function bootstrap() {
  try {
    setSplashStatus('Initializing...');
    await msalInstance.initialize();

    // Handle redirect response if any
    const response = await msalInstance.handleRedirectPromise();
    if (response) {
      msalInstance.setActiveAccount(response.account);
    }

    const accounts = msalInstance.getAllAccounts();
    if (accounts.length === 0) {
      setSplashStatus('Please sign in to continue.');
      document.getElementById('splashSpinner').style.display = 'none';
      document.getElementById('signInBtn').classList.add('visible');
      document.getElementById('signInBtn').onclick = () => signIn();
      return;
    }

    msalInstance.setActiveAccount(accounts[0]);
    await loadUserAndApp();

  } catch (err) {
    console.error('Bootstrap error:', err);
    showSplashError('Failed to initialize: ' + err.message);
  }
}

async function signIn() {
  try {
    document.getElementById('signInBtn').classList.remove('visible');
    document.getElementById('splashError').classList.remove('visible');
    document.getElementById('splashSpinner').style.display = 'inline-block';
    setSplashStatus('Signing in...');
    // Try popup first — better UX when allowed
    try {
      await msalInstance.loginPopup(loginRequest);
      await loadUserAndApp();
    } catch (popupErr) {
      // Fallback to redirect for environments that block popups (Teams, nested popups, etc.)
      if (popupErr.errorCode === 'block_nested_popups' ||
          popupErr.errorCode === 'popup_window_error' ||
          popupErr.errorCode === 'user_cancelled' ||
          /popup/i.test(popupErr.message)) {
        setSplashStatus('Redirecting to Microsoft sign-in...');
        await msalInstance.loginRedirect(loginRequest);
        return; // loginRedirect navigates away; the next page load will complete sign-in
      }
      throw popupErr;
    }
  } catch (err) {
    console.error('Sign-in error:', err);
    showSplashError('Sign-in failed: ' + err.message);
  }
}

async function loadUserAndApp() {
  try {
    setSplashStatus('Loading your profile...');
    const me = await callGraph('/me');

    setSplashStatus('Checking your role...');
    const role = await detectRole();

    state.user = {
      displayName: me.displayName,
      email: me.mail || me.userPrincipalName,
      id: me.id,
      jobTitle: me.jobTitle || '',
      role
    };

    setSplashStatus('Connecting to SharePoint...');
    await initSharePoint();

    setSplashStatus('Loading tickets...');
    await refreshTickets();

    if (role === 'admin' || role === 'agent') {
      try {
        await loadAgents();
      } catch (e) {
        console.warn('Could not load agent list:', e.message);
      }
    }

    enterApp();
  } catch (err) {
    console.error('Load error:', err);
    showSplashError('Failed to load: ' + err.message);
  }
}

async function detectRole() {
  try {
    const result = await callGraph('/me/memberOf?$select=id,displayName');
    const groupNames = result.value.map(g => g.displayName).filter(Boolean);
    if (groupNames.includes(CONFIG.adminGroup)) return 'admin';
    if (groupNames.includes(CONFIG.agentGroup)) return 'agent';
    return 'user';
  } catch (e) {
    console.warn('Role detection failed, defaulting to user:', e.message);
    return 'user';
  }
}

async function loadAgents() {
  // Get all members of the IT-HelpDesk-Agents group for assignment dropdowns
  const groupsResult = await callGraph(`/groups?$filter=displayName eq '${CONFIG.agentGroup}'`);
  if (groupsResult.value.length === 0) return;
  const agentGroupId = groupsResult.value[0].id;
  const members = await callGraph(`/groups/${agentGroupId}/members?$select=id,displayName,mail,userPrincipalName`);
  state.agentList = members.value.map(m => ({
    id: m.id,
    name: m.displayName,
    email: m.mail || m.userPrincipalName
  }));
}

async function initSharePoint() {
  // Get site ID
  const site = await callGraph(`/sites/${CONFIG.sharepointHost}:${CONFIG.sitePath}`);
  state.siteId = site.id;

  // Get list ID
  const lists = await callGraph(`/sites/${state.siteId}/lists?$filter=displayName eq '${CONFIG.listName}'`);
  if (lists.value.length === 0) throw new Error(`List '${CONFIG.listName}' not found`);
  state.listId = lists.value[0].id;
}

function signOut() {
  msalInstance.logoutRedirect({
    postLogoutRedirectUri: window.location.origin + window.location.pathname
  });
}

// ============================================================
//  SHAREPOINT DATA LAYER
// ============================================================

async function fetchTickets() {
  // Returns array of items with fields expanded
  // We request the fields explicitly so Graph can include Person field details
  const url = `/sites/${state.siteId}/lists/${state.listId}/items?$expand=fields&$top=500`;
  const result = await callGraph(url);
  const tickets = result.value.map(item => normalizeTicket(item));

  // Resolve missing Person field display names via the User Information List
  await resolvePersonFields(tickets);

  return tickets;
}

// Cache for SharePoint user lookups (lookupId -> {name, email})
const userCache = new Map();
let userListId = null;
let userInfoListBootstrapped = false;

async function findUserInformationListId() {
  if (userListId) return userListId;
  // Try common names for the user info list
  const candidates = ['User Information List', 'Users'];
  for (const name of candidates) {
    try {
      const result = await callGraph(`/sites/${state.siteId}/lists?$filter=displayName eq '${encodeURIComponent(name).replace(/'/g, "''")}'`);
      if (result.value && result.value.length > 0) {
        userListId = result.value[0].id;
        console.log(`Found User Information List as "${name}" → ${userListId}`);
        return userListId;
      }
    } catch (e) {
      console.warn(`Lookup attempt failed for "${name}":`, e.message);
    }
  }
  // Last resort: query all lists and find the one with template type 112 (User Info)
  try {
    const all = await callGraph(`/sites/${state.siteId}/lists?$select=id,displayName,list&$top=200`);
    const found = all.value.find(l =>
      l.displayName === 'User Information List' ||
      l.displayName === 'Users' ||
      l.displayName?.toLowerCase().includes('user information')
    );
    if (found) {
      userListId = found.id;
      console.log(`Found User Information List by enumeration → ${userListId}`);
      return userListId;
    }
  } catch (e) {
    console.warn('Could not enumerate lists for user info list:', e.message);
  }
  return null;
}

async function bootstrapUserCache() {
  if (userInfoListBootstrapped) return;
  userInfoListBootstrapped = true;
  const listId = await findUserInformationListId();
  if (!listId) {
    console.warn('User Information List not accessible — person names will show as "User #N"');
    return;
  }
  try {
    const result = await callGraph(`/sites/${state.siteId}/lists/${listId}/items?$expand=fields&$top=500`);
    let count = 0;
    result.value.forEach(item => {
      const f = item.fields || {};
      const id = parseInt(f.id || item.id);
      const name = f.Title || f.Name || f.UserName || '';
      const email = f.EMail || f.Email || '';
      if (id) {
        userCache.set(id, { name, email });
        count++;
      }
    });
    console.log(`Cached ${count} SharePoint users from User Information List`);
  } catch (e) {
    console.warn('Failed to bootstrap user cache:', e.message);
  }
}

async function resolvePersonFields(tickets) {
  // One-time: load all SharePoint users into the cache
  await bootstrapUserCache();
  applyUserCache(tickets);
}

function applyUserCache(tickets) {
  tickets.forEach(t => {
    if (t.requesterLookupId && (t.requesterName === 'Unknown' || !t.requesterName)) {
      const u = userCache.get(t.requesterLookupId);
      if (u && u.name) {
        t.requesterName = u.name;
        t.requesterEmail = u.email || t.requesterEmail;
      } else {
        t.requesterName = `User #${t.requesterLookupId}`;
      }
    }
    if (t.assigneeLookupId && !t.assigneeName) {
      const u = userCache.get(t.assigneeLookupId);
      if (u && u.name) {
        t.assigneeName = u.name;
        t.assigneeEmail = u.email || t.assigneeEmail;
      } else {
        t.assigneeName = `User #${t.assigneeLookupId}`;
      }
    }
  });
}

function extractPerson(fields, baseName) {
  // Person fields in Graph appear in various shapes. Parse defensively.
  // Always pull lookupId from the explicit LookupId field first.
  const lookupIdRaw = fields[baseName + 'LookupId'];
  const lookupId = lookupIdRaw ? parseInt(lookupIdRaw) : null;

  // Try the main field as either a string display name or a person object
  const v = fields[baseName];
  if (typeof v === 'string' && v.trim()) {
    return { name: v, email: '', lookupId };
  }
  if (typeof v === 'object' && v !== null) {
    const name = v.LookupValue || v.DisplayName || v.Title || '';
    const email = v.Email || v.email || '';
    return { name, email, lookupId: v.LookupId || lookupId };
  }
  // Try "FieldName0" variant
  const v0 = fields[baseName + '0'];
  if (typeof v0 === 'string' && v0.trim()) {
    return { name: v0, email: '', lookupId };
  }
  // No display data — return lookupId only; resolvePersonFields will fill in the name
  return { name: '', email: '', lookupId };
}

function normalizeTicket(item) {
  const f = item.fields || {};
  const requester = extractPerson(f, 'Requester');
  const assignee = extractPerson(f, 'AssignedTo');

  // ONE-TIME diagnostic: log the first ticket's raw fields so we can see Graph's actual structure
  if (!window._loggedSampleFields) {
    console.log('SAMPLE FIELDS FROM GRAPH (first ticket) →', JSON.parse(JSON.stringify(f)));
    console.log('Field keys returned:', Object.keys(f));
    window._loggedSampleFields = true;
  }

  return {
    id: item.id,                                 // SharePoint item ID
    ticketId: f.TicketID || '',
    title: f.Title || '(no title)',
    description: f.Description || '',
    category: f.Category || 'Other',
    priority: f.Priority || 'Medium',
    status: f.Status || 'Open',
    department: f.Department || '',
    requesterName: requester.name || 'Unknown',
    requesterEmail: requester.email || '',
    requesterLookupId: requester.lookupId,
    assigneeName: assignee.name || null,
    assigneeEmail: assignee.email || '',
    assigneeLookupId: assignee.lookupId,
    createdAt: item.createdDateTime,
    modifiedAt: item.lastModifiedDateTime,
    firstResponseAt: f.FirstResponseAt || null,
    resolvedAt: f.ResolvedAt || null,
    comments: f.Comments || '',
    slaHours: f.SLAHours || resolveSLAHoursFromPriority(f.Priority),
    breachNotified: !!f.BreachNotified,
    raw: item
  };
}

function resolveSLAHoursFromPriority(p) {
  return SLA[p]?.resolution || 24;
}

async function refreshTickets() {

async function createTicketCore(data) {
  // Generate next TicketID
  const existing = state.tickets
    .map(t => parseInt((t.ticketId || '').replace(/[^0-9]/g, '')) || 0)
    .filter(n => !isNaN(n));
  const nextNum = existing.length === 0 ? 1 : Math.max(...existing) + 1;
  const ticketId = 'TKT-' + String(nextNum).padStart(4, '0');

  const fields = {
    Title: data.title,
    TicketID: ticketId,
    Description: data.description,
    Category: data.category,
    Priority: data.priority,
    Status: 'Open',
    Department: data.department
  };

  // Person field: resolve the user's SharePoint LookupId
  if (state.user?.email) {
    let lookupId = null;

    // First try the in-memory user cache (populated by bootstrapUserCache at startup)
    await bootstrapUserCache();
    const emailLower = state.user.email.toLowerCase();
    for (const [id, user] of userCache.entries()) {
      if ((user.email || '').toLowerCase() === emailLower) {
        lookupId = id;
        console.log(`Found requester in userCache: ${state.user.email} → LookupId ${id}`);
        break;
      }
    }

    // If not in cache, try the SharePoint REST ensureUser via Graph
    if (!lookupId) {
      try {
        lookupId = await ensureSharePointUser(state.user.email);
        if (lookupId) console.log(`Found requester via ensureSharePointUser: ${state.user.email} → LookupId ${lookupId}`);
      } catch (e) {
        console.warn('Requester lookup via ensureSharePointUser failed:', e.message);
      }
    }

    if (lookupId) {
      fields.RequesterLookupId = lookupId;
    } else {
      console.warn(`Could not resolve LookupId for ${state.user.email}. Ticket will be created without Requester field set.`);
    }
  }

  console.log('Creating ticket with fields:', fields);

  const url = `/sites/${state.siteId}/lists/${state.listId}/items`;
  const result = await callGraph(url, {
    method: 'POST',
    body: JSON.stringify({ fields })
  });

  console.log('Ticket created:', result);
  return { ticketId, item: result };
}

async function ensureSharePointUser(email) {
  // Use SharePoint's hidden User Information List, accessed via Graph
  try {
    const result = await callGraph(`/sites/${state.siteId}/lists/User Information List/items?$expand=fields&$filter=fields/EMail eq '${encodeURIComponent(email)}'`);
    if (result.value.length > 0) {
      return parseInt(result.value[0].fields.id || result.value[0].id);
    }
  } catch (e) {
    console.warn('User info list query failed:', e.message);
  }
  return null;
}

async function updateTicket(itemId, fields) {
  const url = `/sites/${state.siteId}/lists/${state.listId}/items/${itemId}/fields`;
  return callGraph(url, {
    method: 'PATCH',
    body: JSON.stringify(fields)
  });
}

async function appendComment(ticket, text) {
  const now = new Date();
  const author = state.user.displayName;
  const newLine = `[${now.toLocaleString('en-GB')}] ${author}:\n${text}\n\n`;
  const updated = (ticket.comments || '') + newLine;
  return updateTicket(ticket.id, { Comments: updated });
}

function fmt(ts) {
  if (!ts) return '—';
  try {
    return new Date(ts).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  } catch (e) { return '—'; }
}
function ago(ts) {
  if (!ts) return '—';
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff/60000);
  if (m<1) return 'just now';
  if (m<60) return m+'m ago';
  const h = Math.floor(m/60);
  if (h<24) return h+'h ago';
  const d = Math.floor(h/24);
  return d+'d ago';
}
function initials(name) {
  return (name || '?').split(' ').filter(Boolean).slice(0,2).map(s=>s[0]).join('').toUpperCase();
}
function slaStatus(t) {
  if (t.status==='Resolved' || t.status==='Closed') return 'ok';
  const targetMs = (t.slaHours || 24) * 3600 * 1000;
  const elapsed = Date.now() - new Date(t.createdAt).getTime();
  const pct = elapsed/targetMs;
  if (pct >= 1) return 'breach';
  if (pct >= 0.8) return 'warn';
  return 'ok';
}
function escapeHtml(str) {
  return (str||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function badgeClass(label) {
  return 'badge-' + label.toLowerCase().replace(/\s+/g, '');
}
function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = 'toast' + (type==='error' ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

    </div>

    <h2 style="font-size:16px;margin:24px 0 12px">Recent Tickets</h2>
    ${renderTicketTable(all.slice().sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0,10), {showRequester:true, showAssignee:true})}
  `;

  document.getElementById('refreshBtn').onclick = doRefresh;
  attachRowHandlers();
}

function pageSlaBreaches(root) {
  const breaches = state.tickets
    .filter(t => slaStatus(t) === 'breach' && t.status !== 'Resolved' && t.status !== 'Closed')
    .sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
  root.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">SLA Breaches</div>
        <div class="page-subtitle">${breaches.length} ticket(s) past their resolution SLA target.</div>
      </div>
      <button class="btn btn-secondary" id="refreshBtn">Refresh</button>
    </div>
    ${breaches.length === 0
      ? `<div class="panel"><div class="empty-state"><div class="big">✓</div><div>No SLA breaches. Sharp sharp!</div></div></div>`
      : renderTicketTable(breaches, {showRequester:true, showAssignee:true})}
  `;
  document.getElementById('refreshBtn').onclick = doRefresh;
  attachRowHandlers();
}

function pageSlaInfo(root) {
  root.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">SLA Targets</div>
        <div class="page-subtitle">Service level commitments by priority.</div>
      </div>
    </div>
    <div class="panel">
      <table>
        <thead><tr><th>Priority</th><th>First Response</th><th>Resolution Target</th><th>When to use</th></tr></thead>
        <tbody>
          <tr><td><span class="badge badge-critical">Critical</span></td><td>1 hour</td><td>4 hours</td><td>Work fully blocked / multiple users affected / system down</td></tr>
          <tr><td><span class="badge badge-high">High</span></td><td>2 hours</td><td>8 hours</td><td>Major function broken, no workaround</td></tr>
          <tr><td><span class="badge badge-medium">Medium</span></td><td>4 hours</td><td>24 hours</td><td>Function impaired but workaround exists</td></tr>
          <tr><td><span class="badge badge-low">Low</span></td><td>8 hours</td><td>72 hours</td><td>Cosmetic / informational / request</td></tr>
        </tbody>
      </table>
    </div>
    <div class="footer-note">SLAs measured in business hours. Critical tickets trigger after-hours escalation.</div>
  `;
}

// ============================================================
//  RENDER HELPERS
// ============================================================

function renderStatBar(tickets) {
  const open = tickets.filter(t => t.status === 'Open').length;
  const inProgress = tickets.filter(t => t.status === 'In Progress').length;
  const resolved = tickets.filter(t => t.status === 'Resolved' || t.status === 'Closed').length;
  return `
    <div class="stats-grid">
      <div class="stat-card info"><div class="stat-label">Open</div><div class="stat-value">${open}</div></div>
      <div class="stat-card warning"><div class="stat-label">In Progress</div><div class="stat-value">${inProgress}</div></div>
      <div class="stat-card success"><div class="stat-label">Resolved</div><div class="stat-value">${resolved}</div></div>
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${tickets.length}</div></div>
    </div>
  `;
}

function renderTicketTable(tickets, opts={}) {
  if (!state.loaded) {
    return `<div class="panel"><table><tbody><tr class="loading-row"><td><span class="inline-spinner"></span>Loading tickets from SharePoint...</td></tr></tbody></table></div>`;
  }
  if (tickets.length === 0) {
    return `<div class="panel"><div class="empty-state"><div class="big">📭</div><div>No tickets to show.</div></div></div>`;
  }
  const showReq = opts.showRequester;
  const showAsg = opts.showAssignee;
  return `
    <div class="panel">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Category</th>
            <th>Priority</th>
            <th>Status</th>
            ${showReq ? '<th>Requester</th>' : ''}
            ${showAsg ? '<th>Assignee</th>' : ''}
            <th>SLA</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody>
          ${tickets.map(t => {
            const sla = slaStatus(t);
            const slaBadge = sla === 'breach' ? '<span class="badge badge-sla-breach">Breached</span>'
                          : sla === 'warn' ? '<span class="badge badge-sla-warn">At risk</span>'
                          : '<span class="badge badge-sla-ok">OK</span>';
            return `
              <tr class="clickable" data-id="${t.id}">
                <td style="font-family:monospace;font-weight:600">${escapeHtml(t.ticketId)}</td>
                <td>${escapeHtml(t.title)}</td>
                <td>${escapeHtml(t.category)}</td>
                <td><span class="badge badge-${t.priority.toLowerCase()}">${t.priority}</span></td>
                <td><span class="badge ${badgeClass(t.status)}">${t.status}</span></td>
                ${showReq ? `<td>${escapeHtml(t.requesterName)}<div style="font-size:11px;color:var(--muted)">${escapeHtml(t.department)}</div></td>` : ''}
                ${showAsg ? `<td>${t.assigneeName ? escapeHtml(t.assigneeName) : '<span style="color:var(--muted)">Unassigned</span>'}</td>` : ''}
                <td>${slaBadge}</td>
                <td>${ago(t.createdAt)}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function attachRowHandlers() {
  document.querySelectorAll('tr.clickable').forEach(row => {
    row.addEventListener('click', () => openTicket(row.dataset.id));
  });
}

async function doRefresh() {
  const btn = document.getElementById('refreshBtn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="inline-spinner"></span>Refreshing...';
  }
  try {
    await refreshTickets();
    renderPage(state.currentPage);
  } catch (e) {
    showToast('Refresh failed: ' + e.message, 'error');
  }
}

// ============================================================
//  TICKET DETAIL MODAL
// ============================================================

function openTicket(itemId) {
  const t = state.tickets.find(x => x.id === itemId);
  if (!t) return;
  const canEdit = state.user.role === 'agent' || state.user.role === 'admin';
  const isRequester = (t.requesterEmail || '').toLowerCase() === (state.user.email || '').toLowerCase();

  document.getElementById('modalTitle').textContent = `${t.ticketId} · ${t.title}`;

  const sla = slaStatus(t);
  const slaBadge = sla === 'breach' ? '<span class="badge badge-sla-breach">Breached</span>'
                  : sla === 'warn' ? '<span class="badge badge-sla-warn">At risk</span>'
                  : '<span class="badge badge-sla-ok">Within SLA</span>';

  const agentOptions = ['<option value="">— Unassigned —</option>']
    .concat(state.agentList.map(a => `<option value="${escapeHtml(a.email)}" ${t.assigneeName === a.name ? 'selected' : ''}>${escapeHtml(a.name)}</option>`))
    .join('');

  document.getElementById('modalBody').innerHTML = `
    <div class="detail-grid">
      <div>
        <div style="font-size:13px;line-height:1.6;background:var(--navy-3);padding:14px;border-radius:8px;margin-bottom:18px;white-space:pre-wrap">${escapeHtml(t.description)}</div>

        ${canEdit ? `
          <div class="form-row">
            <div class="field">
              <label>Status</label>
              <select id="dStatus">${STATUSES.map(s=>`<option ${s===t.status?'selected':''}>${s}</option>`).join('')}</select>
            </div>
            <div class="field">
              <label>Priority</label>
              <select id="dPriority">${PRIORITIES.map(p=>`<option ${p===t.priority?'selected':''}>${p}</option>`).join('')}</select>
            </div>
          </div>
          <div class="form-row">
            <div class="field">
              <label>Assignee</label>
              <select id="dAssignee">${agentOptions}</select>
            </div>
            <div class="field">
              <label>Category</label>
              <select id="dCategory">${CATEGORIES.map(c=>`<option ${c===t.category?'selected':''}>${c}</option>`).join('')}</select>
            </div>
          </div>
        ` : ''}

        <div class="activity">
          <h4>Activity & Comments</h4>
          <div id="commentList">
            ${renderComments(t)}
          </div>
          <div class="field" style="margin-top:14px">
            <label>Add a comment / update</label>
            <textarea id="dComment" placeholder="Type an update..."></textarea>
          </div>
          <button class="btn btn-secondary btn-sm" id="dAddComment">Post Comment</button>
        </div>
      </div>

      <div>
        <div class="meta-list">
          <div class="meta-row"><span class="meta-label">Status</span><span class="meta-value"><span class="badge ${badgeClass(t.status)}">${t.status}</span></span></div>
          <div class="meta-row"><span class="meta-label">Priority</span><span class="meta-value"><span class="badge badge-${t.priority.toLowerCase()}">${t.priority}</span></span></div>
          <div class="meta-row"><span class="meta-label">SLA</span><span class="meta-value">${slaBadge}</span></div>
          <div class="meta-row"><span class="meta-label">Category</span><span class="meta-value">${escapeHtml(t.category)}</span></div>
          <div class="meta-row"><span class="meta-label">Requester</span><span class="meta-value">${escapeHtml(t.requesterName)}</span></div>
          <div class="meta-row"><span class="meta-label">Department</span><span class="meta-value">${escapeHtml(t.department)}</span></div>
          <div class="meta-row"><span class="meta-label">Assignee</span><span class="meta-value">${t.assigneeName ? escapeHtml(t.assigneeName) : '—'}</span></div>
          <div class="meta-row"><span class="meta-label">Created</span><span class="meta-value">${fmt(t.createdAt)}</span></div>
          <div class="meta-row"><span class="meta-label">1st Response</span><span class="meta-value">${fmt(t.firstResponseAt)}</span></div>
          <div class="meta-row"><span class="meta-label">Resolved</span><span class="meta-value">${fmt(t.resolvedAt)}</span></div>
        </div>
      </div>
    </div>
  `;

  const footer = document.getElementById('modalFooter');
  if (canEdit) {
    footer.innerHTML = `
      <button class="btn btn-secondary" id="dClose">Close</button>
      <button class="btn btn-primary" id="dSave">Save Changes</button>
    `;
    document.getElementById('dSave').onclick = () => saveTicketChanges(t);
  } else {
    footer.innerHTML = `<button class="btn btn-secondary" id="dClose">Close</button>`;
  }
  document.getElementById('dClose').onclick = closeModal;

  document.getElementById('dAddComment').onclick = async () => {
    const text = document.getElementById('dComment').value.trim();
    if (!text) return;
    const btn = document.getElementById('dAddComment');
    btn.disabled = true; btn.innerHTML = '<span class="inline-spinner"></span>Posting...';
    try {
      await appendComment(t, text);
      // If agent is responding for the first time, set FirstResponseAt
      if (state.user.role === 'agent' && !t.firstResponseAt) {
        await updateTicket(t.id, { FirstResponseAt: new Date().toISOString() });
      }
      await refreshTickets();
      const fresh = state.tickets.find(x => x.id === t.id);
      openTicket(fresh.id);
    } catch (e) {
      showToast('Failed to post comment: ' + e.message, 'error');
      btn.disabled = false; btn.textContent = 'Post Comment';
    }
  };

  document.getElementById('modalBg').classList.add('active');
}

function renderComments(t) {
  const text = (t.comments || '').trim();
  if (!text) return '<div style="color:var(--muted);font-size:13px;padding:8px">No activity yet.</div>';
  // Parse the comments string which uses our convention: [timestamp] author:\ntext\n\n
  const blocks = text.split('\n\n').filter(b => b.trim());
  return blocks.map(b => {
    const lines = b.split('\n');
    const header = lines[0] || '';
    const body = lines.slice(1).join('\n');
    return `
      <div class="comment">
        <div class="comment-meta">
          <span class="comment-author">${escapeHtml(header)}</span>
        </div>
        <div class="comment-text">${escapeHtml(body)}</div>
      </div>
    `;
  }).join('');
}

async function saveTicketChanges(t) {
  const newStatus = document.getElementById('dStatus').value;
  const newPriority = document.getElementById('dPriority').value;
  const newAssigneeEmail = document.getElementById('dAssignee').value;
  const newCategory = document.getElementById('dCategory').value;

  const fields = {};
  if (newStatus !== t.status) fields.Status = newStatus;
  if (newPriority !== t.priority) fields.Priority = newPriority;
  if (newCategory !== t.category) fields.Category = newCategory;

  // Assignee lookup
  if (newAssigneeEmail) {
    try {
      const lookupId = await ensureSharePointUser(newAssigneeEmail);
      if (lookupId) fields.AssignedToLookupId = lookupId;
    } catch (e) {
      console.warn('Assignee lookup failed:', e.message);
    }
  } else if (!newAssigneeEmail && t.assigneeName) {
    fields.AssignedToLookupId = null;
  }

  // Set timestamps automatically based on status transitions
  if (newStatus === 'In Progress' && !t.firstResponseAt) {
    fields.FirstResponseAt = new Date().toISOString();
  }
  if ((newStatus === 'Resolved' || newStatus === 'Closed') && !t.resolvedAt) {
    fields.ResolvedAt = new Date().toISOString();
  }

  if (Object.keys(fields).length === 0) {
    closeModal();
    return;
  }

  const btn = document.getElementById('dSave');
  btn.disabled = true;
  btn.innerHTML = '<span class="inline-spinner"></span>Saving...';

  try {
    await updateTicket(t.id, fields);
    showToast('Ticket updated.');
    await refreshTickets();
    closeModal();
    renderPage(state.currentPage);
  } catch (e) {
    showToast('Save failed: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Save Changes';
  }
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('active');
}
document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target.id === 'modalBg') closeModal();
});

// ============================================================
//  BOOT
// ============================================================

bootstrap();

</script>
</body>
</html>
